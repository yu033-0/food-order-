<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>期末專題-智慧點餐系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .receipt-box { background: #222; color: #0f0; font-family: monospace; padding: 15px; border-radius: 5px; min-height: 150px; white-space: pre-wrap; }
    </style>
</head>
<body class="container mt-5">
    <h1 class="text-center mb-4">🍔 智慧點餐機系統 🍟</h1>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card p-4 shadow-sm mb-4">
                <h4 class="mb-3">🌟 精選菜單 (來自 C++ 後端)</h4>
                <div class="row text-center" id="menu-container">
                    <p class="text-muted">正在連線至 C++ 後端抓取菜單...</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-4 shadow-sm sticky-top" style="top: 20px;">
                <h4 class="mb-3">🛒 我的購物車明細</h4>
                
                <div id="receipt-display" class="receipt-box mb-3">暫無點餐資料。</div>
                
                <button class="btn btn-success w-100 fw-bold mb-2" onclick="updateReceipt()">🔄 重新整理購物車</button>
                <button class="btn btn-danger w-100 fw-bold" onclick="checkout()">💳 確認結帳 (印出收據)</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 網頁一打開，自動去跟 C++ 後端拿最新的菜單資料
        window.onload = function() {
            fetch('/api/menu')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('menu-container');
                    container.innerHTML = ''; 
                    
                    data.forEach(item => {
                        container.innerHTML += `
                            <div class="col-md-6 mb-3">
                                <div class="card p-3 border-1 h-100 d-flex flex-column justify-content-between">
                                    <h3>${item.name}</h3>
                                    <p class="text-danger fs-4 fw-bold">$${item.price}</p>
                                    <button class="btn btn-primary mt-auto" onclick="sendOrder(${item.id}, '${item.name}')">🛒 加入購物車</button>
                                </div>
                            </div>
                        `;
                    });
                    // 初始化讀取一次購物車
                    updateReceipt();
                })
                .catch(err => {
                    document.getElementById('menu-container').innerHTML = `<div class="alert alert-danger">❌ 無法連線至 C++ 後端。</div>`;
                });
        };

        // 2. 點餐並傳送給 C++ 後端
        function sendOrder(itemId, itemName) {
            fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "id": itemId, "qty": 1 }) 
            })
            .then(response => response.text())
            .then(data => {
                // 點餐成功後，立刻「自動更新」右邊的購物車明細！
                updateReceipt();
            });
        }

        // 3. 向 C++ 後端索取最新的購物車明細與計算結果
        function updateReceipt() {
            fetch('/api/receipt')
                .then(response => response.text())
                .then(text => {
                    document.getElementById('receipt-display').innerText = text;
                });
        }

        // 4. 結帳按鈕
        function checkout() {
            alert("結帳成功！請查看您的 Linux 終端機，C++ 後端已同步處理訂單。");
        }
    </script>
</body>
</html>
